<svg width="100%" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000814">
        <animate attributeName="stop-color" values="#000814;#001d3d;#003566;#001d3d;#000814" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#003566">
        <animate attributeName="stop-color" values="#003566;#00b4d8;#003566;#001d3d;#003566" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#000814">
        <animate attributeName="stop-color" values="#000814;#023047;#000814;#001d3d;#000814" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#90e0ef" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#90e0ef" stop-opacity="0"/>
    </radialGradient>

    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00b4d8" stroke-width="0.4" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="260" fill="url(#bgGrad)"/>
  <rect width="1200" height="260" fill="url(#grid)"/>

  <!-- Drifting glow orbs -->
  <circle cx="100" cy="60" r="90" fill="url(#glowGrad)" opacity="0.25">
    <animate attributeName="cx" values="100;1100;100" dur="18s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="200" r="70" fill="url(#glowGrad)" opacity="0.2">
    <animate attributeName="cx" values="1000;150;1000" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating particles along paths -->
  <g>
    <circle r="3" fill="#90e0ef">
      <animateMotion dur="6s" repeatCount="indefinite" path="M50,220 C300,50 600,250 950,80"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#00b4d8">
      <animateMotion dur="9s" repeatCount="indefinite" path="M1150,30 C900,180 500,20 80,190"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#48cae4">
      <animateMotion dur="7.5s" repeatCount="indefinite" path="M100,40 C400,220 800,60 1150,200"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="7.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Scanline sweep -->
  <rect x="0" y="0" width="1200" height="3" fill="#90e0ef" opacity="0.6">
    <animate attributeName="y" values="0;257;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Border frame -->
  <rect x="6" y="6" width="1188" height="248" fill="none" stroke="#00b4d8" stroke-width="1.5" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>
  <line x1="6" y1="6" x2="60" y2="6" stroke="#90e0ef" stroke-width="3"/>
  <line x1="6" y1="6" x2="6" y2="60" stroke="#90e0ef" stroke-width="3"/>
  <line x1="1194" y1="254" x2="1140" y2="254" stroke="#90e0ef" stroke-width="3"/>
  <line x1="1194" y1="254" x2="1194" y2="200" stroke="#90e0ef" stroke-width="3"/>

  <!-- Main glowing title -->
  <text x="600" y="120" text-anchor="middle" font-family="Orbitron, 'Trebuchet MS', sans-serif"
        font-size="56" font-weight="700" fill="#ffffff" filter="url(#textGlow)" letter-spacing="6">
    EHTISHAM TAHIR
    <animate attributeName="fill" values="#ffffff;#90e0ef;#ffffff" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="600" y="160" text-anchor="middle" font-family="Consolas, monospace" font-size="18" fill="#90e0ef" letter-spacing="2">
    &lt;&lt; HUMAN.EXE — SYSTEM ONLINE &gt;&gt;
    <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/>
  </text>

  <!-- Status readout -->
  <text x="600" y="200" text-anchor="middle" font-family="Consolas, monospace" font-size="14" fill="#48cae4">
    <tspan id="statusText">PYTHON // FULLSTACK // UI-UX</tspan>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" begin="0s"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="742" y="188" width="10" height="16" fill="#90e0ef">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom pulse bar -->
  <rect x="450" y="225" width="300" height="4" rx="2" fill="#00b4d8" opacity="0.4">
    <animate attributeName="width" values="0;300;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="600;450;600" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
